name: DevSecOps Toolkit Scan

on:
  push:
    branches: [ "main", "master", "v2-development" ]
  pull_request:
    branches: [ "main", "master", "v2-development" ]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Ejecutar DevSecOps Toolkit
      env:
        CI: "true" # Fuerza el modo no interactivo
        VT_API_KEY: ${{ secrets.VT_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py . --todo --nombre-reporte "reporte_github_actions"
        
    - name: Subir Reporte HTML como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: devsecops-security-report
        path: reportes/reporte_github_actions.html